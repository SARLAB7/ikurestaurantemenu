<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin SFG | Gestión</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Estilos específicos para el formulario de admin */
        body { background: #1a1a1a; color: white; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-save { background: #ffcc00; border: none; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 6px; }
        .btn-google { background: #4285F4; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; }
        #admin-panel { display: none; }
        .plato-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; margin-top: 10px; }
        .btn-delete { background: #d9534f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div id="login-screen">
            <h2 style="text-align:center">SFG Admin</h2>
            <button class="btn-google" id="login-btn">Entrar con Google</button>
        </div>

        <div id="admin-panel">
            <p id="user-tag" style="font-size:0.7rem; color: #888; text-align:right"></p>
            <h2>Nuevo Plato</h2>
            <form id="menu-form">
                <input type="text" id="name" placeholder="Nombre del plato" required>
                <input type="number" id="price" placeholder="Precio (ej: 22000)" required>
                <select id="category">
                    <option value="diario">Menú del Día</option>
                    <option value="rapida">Comidas Rápidas</option>
                    <option value="varios">Varios</option>
                </select>
                <textarea id="desc" placeholder="Descripción"></textarea>
                <input type="text" id="ingredients" placeholder="Ingredientes (separados por coma)">
                <button type="submit" class="btn-save">PUBLICAR EN EL MENÚ</button>
            </form>

            <hr style="margin:30px 0">
            <h3>Platos Activos (Para retirar)</h3>
            <div id="lista-admin">
                </div>
            
            <button id="logout-btn" style="background:none; border:none; color:red; cursor:pointer; margin-top:20px; width:100%">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module" src="admin-script.js"></script>
</body>
</html>
