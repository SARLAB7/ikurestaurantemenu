<section id="v-stats" class="view-section">
    <h3 style="margin-bottom: 24px;">Resumen Financiero</h3>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px;">
        <div class="stat-card">
            <div style="font-size: 0.85rem; color: var(--text-muted);">Ventas de Hoy</div>
            <strong id="s-hoy" style="font-size: 1.8rem; font-weight: 600;">$0</strong>
        </div>
        <div class="stat-card">
            <div style="font-size: 0.85rem; color: var(--text-muted);">Pedidos Hoy</div>
            <strong id="s-pedidos-total" style="font-size: 1.8rem; font-weight: 600;">0</strong>
        </div>
        <div class="stat-card">
            <div style="font-size: 0.85rem; color: var(--text-muted);">Ticket Promedio</div>
            <strong id="s-ticket-promedio" style="font-size: 1.8rem; font-weight: 600;">$0</strong>
        </div>
        <div class="stat-card">
            <div style="font-size: 0.85rem; color: var(--text-muted);">Ventas del Mes</div>
            <strong id="s-mes" style="font-size: 1.8rem; font-weight: 600;">$0</strong>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;">
        <div class="admin-panel-card" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
            <h4 style="margin-bottom: 15px;">Ingresos por Método (Hoy)</h4>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div style="display: flex; justify-content: space-between;"><span>Nequi</span> <strong id="s-nequi">$0</strong></div>
                <div style="display: flex; justify-content: space-between;"><span>Banco</span> <strong id="s-bancolombia">$0</strong></div>
                <div style="display: flex; justify-content: space-between;"><span>Efectivo</span> <strong id="s-efectivo">$0</strong></div>
            </div>
        </div>

        <div class="admin-panel-card" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
            <h4 style="margin-bottom: 15px;">Ingredientes más Rechazados ❌</h4>
            <div id="rankings-rechazados" style="display: flex; flex-wrap: wrap; gap: 8px;">
                <span style="color: var(--text-muted); font-size: 0.85rem; font-style: italic;">Sin datos aún...</span>
            </div>
        </div>
    </div>

    <div class="admin-panel-card" style="margin-top: 24px; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
        <h4 style="margin-bottom: 20px;">Platos Más Vendidos</h4>
        <div id="rankings-categoria" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;"></div>
    </div>

    <div class="admin-panel-card" style="margin-top: 24px; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
        <h4 style="margin-bottom: 20px;">Rotación de Ingredientes (Usados) ✅</h4>
        <div id="rankings-ingredientes" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
    </div>
</section>
