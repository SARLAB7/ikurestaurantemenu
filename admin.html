<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #11141a; --accent: #ffcc00; --main-bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--main-bg); display: flex; height: 100vh; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--sidebar-bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #admin-panel { display: none; width: 100%; height: 100vh; }
        
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #8892a0; transition: 0.3s; }
        .nav-item.active { background: #1e232d; color: white; border-left: 4px solid var(--accent); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Estilos Inventario Admin */
        .admin-category-group { margin-bottom: 30px; }
        .admin-category-group h4 { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.8rem; letter-spacing: 1px; color: #666; border-left: 4px solid var(--accent); }
        .admin-dish-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #28a745; }
        input:checked + .slider:before { transform: translateX(18px); }
        
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="login-screen">
        <div style="background:white; padding:40px; border-radius:12px; text-align:center;">
            <h1>IKU ADMIN</h1>
            <button id="login-btn" style="background:var(--sidebar-bg); color:var(--accent); border:none; padding:12px 30px; border-radius:8px; cursor:pointer; margin-top:20px; font-weight:bold;">INGRESAR</button>
        </div>
    </div>

    <div id="admin-panel">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>IKU</h2></div>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)">🔔 Pedidos</div>
            <div class="nav-item" onclick="cambiarVista('v-menu', this)">🍔 Inventario</div>
            <div style="margin-top:auto; padding:20px;"><button onclick="auth.signOut()" style="color:red; background:none; border:none; cursor:pointer;">Cerrar Sesión</button></div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <h2>Pedidos Entrantes</h2>
                <div id="l-pendientes" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top:20px;"></div>
            </section>

            <section id="v-menu" class="view-section">
                <div class="card">
                    <h3 id="f-title">Añadir/Editar Plato</h3>
                    <form id="m-form" style="display:grid; gap:10px; margin-top:15px;">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="name" placeholder="Nombre del Plato" required style="padding:10px;">
                        <input type="number" id="price" placeholder="Precio" required style="padding:10px;">
                        <select id="category" style="padding:10px;">
                            <option value="diario">Menú del Día</option>
                            <option value="rapida">Comidas Rápidas</option>
                            <option value="varios">Varios</option>
                        </select>
                        <textarea id="desc" placeholder="Descripción corta" style="padding:10px;"></textarea>
                        <input type="text" id="ingredients" placeholder="Ingredientes (separados por coma)" style="padding:10px;">
                        <button type="submit" id="s-btn" style="background:var(--sidebar-bg); color:var(--accent); padding:12px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">GUARDAR PLATO</button>
                        <button type="button" id="close-x" onclick="cancelarEdicion()" style="display:none; color:red; border:none; background:none; cursor:pointer;">Cancelar Edición</button>
                    </form>
                </div>
                <div class="card" id="inv-list">
                    </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
