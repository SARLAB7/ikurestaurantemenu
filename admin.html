<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div id="login-screen" class="login-container">
        <div class="login-card">
            <h2>IKU Admin</h2>
            <button id="login-btn" class="btn-primary">Entrar con Google</button>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <aside class="sidebar">
            <h2>IKU<span>.</span></h2>
            <nav>
                <div class="nav-item active" onclick="window.cambiarVista('v-pedidos', this)">📦 Pedidos</div>
                <div class="nav-item" onclick="window.cambiarVista('v-carta', this)">📖 Carta</div>
                <div class="nav-item" onclick="window.cambiarVista('v-mesas', this)">🪑 Mesas</div>
                <div class="nav-item" onclick="window.cambiarVista('v-stats', this)">📈 Métricas</div>
            </nav>
            <div class="logout-wrapper">
                <div class="nav-item" onclick="window.logout()" style="color: var(--danger);">Salir</div>
            </div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <div class="orders-grid">
                    <div class="orders-column">
                        <h3>Pendientes</h3>
                        <div id="l-pendientes"></div>
                    </div>
                    <div class="orders-column">
                        <div class="admin-group">
                            <div class="admin-group-header" onclick="toggleAtendidos()">
                                <span>Atendidos Hoy</span>
                                <svg id="chevron-atendidos" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div id="l-atendidos" class="lista-atendidos-oculta"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="v-carta" class="view-section">
                <div class="carta-layout">
                    <div class="carta-list-container">
                        <h3>Menú Activo</h3>
                        <div id="inv-list"></div>
                    </div>
                    <div class="carta-form-container">
                        <div class="form-card">
                            <h3 id="form-title">Configurar Plato</h3>
                            <form id="plato-form" onsubmit="event.preventDefault(); window.guardarPlato();">
                                <input type="hidden" id="edit-id"> 
                                <input type="text" id="name" placeholder="Nombre del plato" required>
                                <div class="form-row">
                                    <input type="number" id="price" placeholder="Precio" required>
                                    <select id="category">
                                        <option value="diario">Menú del Día</option>
                                        <option value="desayuno">Desayunos</option>
                                        <option value="especial">Especiales</option>
                                        <option value="asado">Asados</option>
                                        <option value="rapida">Comida Rápida</option>
                                        <option value="bebida">Bebidas</option>
                                    </select>
                                </div>
                                <textarea id="desc" placeholder="Descripción"></textarea>
                                <input type="text" id="ingredients" placeholder="Ingredientes (separados por coma)">
                                <button type="submit" id="btn-save" class="btn-primary">GUARDAR PLATO</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

            <section id="v-mesas" class="view-section">
                <h3>Plano de Mesas</h3>
                <div id="grid-mesas" class="mesas-container"></div>
            </section>

            <section id="v-stats" class="view-section">
                <h3>Métricas de Hoy</h3>
                <div class="stats-grid">
                    <div class="stat-card"><span>Total Hoy</span><strong id="s-hoy">$0</strong></div>
                    <div class="stat-card"><span>Ticket Promedio</span><strong id="s-ticket-promedio">$0</strong></div>
                    <div class="stat-card"><span>Nequi</span><b id="s-nequi">$0</b></div>
                    <div class="stat-card"><span>Banco</span><b id="s-bancolombia">$0</b></div>
                    <div class="stat-card"><span>Efectivo</span><b id="s-efectivo">$0</b></div>
                </div>
                <div style="margin-top:20px;">
                    <h3>Populares / Rechazos</h3>
                    <div class="stats-grid">
                        <div class="stat-card"><h4>Top Platos</h4><div id="rankings-categoria"></div></div>
                        <div class="stat-card"><h4>Ingredientes Rechazados</h4><div id="rankings-rechazados"></div></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        window.cambiarVista = function(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        function toggleAtendidos() {
            const l = document.getElementById('l-atendidos');
            const c = document.getElementById('chevron-atendidos');
            l.classList.toggle('lista-atendidos-oculta');
            if(c) c.style.transform = l.classList.contains('lista-atendidos-oculta') ? 'rotate(0deg)' : 'rotate(180deg)';
        }
    </script>
</body>
</html>
