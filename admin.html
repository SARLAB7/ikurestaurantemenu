<section id="v-stats" class="view-section">
    <h3>Resumen Financiero Hoy</h3>
    <div class="stats-grid">
        <div class="stat-card"><span>Total Hoy</span><strong id="s-hoy">$0</strong></div>
        <div class="stat-card"><span>Ticket Promedio</span><strong id="s-ticket-promedio">$0</strong></div>
        <div class="stat-card"><span>Nequi</span><b id="s-nequi">$0</b></div>
        <div class="stat-card"><span>Banco</span><b id="s-bancolombia">$0</b></div>
        <div class="stat-card"><span>Efectivo</span><b id="s-efectivo">$0</b></div>
    </div>

    <div class="metrics-advanced-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 25px;">
        <div class="stat-card">
            <h4>🏆 Top 5 Platos</h4>
            <div id="rankings-categoria"></div>
        </div>
        <div class="stat-card">
            <h4>❌ Ingredientes Rechazados</h4>
            <div id="rankings-rechazados"></div>
        </div>
        <div class="stat-card">
            <h4>✅ Rotación de Despensa</h4>
            <div id="rankings-ingredientes"></div>
        </div>
    </div>
</section>

<div class="form-card">
    <h3>Configurar Plato</h3>
    <div class="form-group">
        <input type="hidden" id="edit-id"> 
        <input type="text" id="p-nombre" placeholder="Nombre del plato">
        <input type="number" id="p-precio" placeholder="Precio">
        <select id="p-categoria">
            <option value="diario">Menú del Día</option>
            <option value="desayuno">Desayunos</option>
            <option value="especial">Especiales</option>
            <option value="asado">Asados</option>
            <option value="rapida">Comida Rápida</option>
            <option value="bebida">Bebidas</option>
        </select>
        <textarea id="p-desc" placeholder="Descripción"></textarea>
        <input type="text" id="p-ingredientes" placeholder="Ingredientes (separados por coma)">
        <button onclick="window.guardarPlato()" class="btn-primary">Guardar Plato</button>
    </div>
</div>
